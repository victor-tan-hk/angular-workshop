<h1> My first Angular app </h1>

<label for="firstbox">First text field:</label><br>

<!-- On the same text field, we perform
  a) Event binding to transfer contents of text field to component property
  b) Property binding to transfer component property value to text field 
  -->
<input #textinput type="text" id="firstbox" 
(input)="processFirstTextField(textinput)"
[value]="firstTextFieldContent">

<p>Content of first text field : {{firstTextFieldContent}}</p>


<label for="secondbox">Second text field:</label><br>

<!-- We can simplify the two way binding between the text field
contents and a component property using ngModel with
banana-in-the-box syntax -->
<input type="text" id="secondbox" [(ngModel)]="secondTextFieldContent">

<p>Content of second text field : {{secondTextFieldContent}}</p>

<button type="button" (click)="resetTextFields()">
Reset content in text fields to: {{initialValue}}
</button>
