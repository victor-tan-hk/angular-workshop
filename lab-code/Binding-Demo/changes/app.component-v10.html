<h1> My first Angular app </h1>

<label for="basicbox">Basic text box:</label><br>

<!-- Standard banana-in-the-box syntax using ngModel 
to perform two way binding between the text field
contents and the component property basicBoxContent -->
<input type="text" id="basicbox" [(ngModel)]="basicBoxContent">

<p>Content of basic text box : {{basicBoxContent}}</p>

<button type="button"(click)="resetBasicTextBox()">Reset content in basic text box to: {{initialValue}}</button>
