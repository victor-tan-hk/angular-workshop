<h1>From the root component</h1>

<p>Value of parent counter : {{parentCounter}}</p>

<button (click)="incCounter()">Increment</button>
<button (click)="decCounter()">Decrement</button>

<p>Text from child : {{childText}}</p>

<!-- In the child component, we have 3 bindings:
 
a) Binding parent property (parentCounter) to 
 child property (ChildCounter) is marked with
 the @Input decorator 

b) Event binding where the event is textChanged
EventEmitter object marked with @Output decorator
and $event is value in the emit method call
which is sent as argument to processChangeFromChild
in parent component 

c) Event binding where the event is counterChanged
EventEmitter object marked with @Output decorator
and $event is value in the emit method call
which is directly assigned to parentCounter property 

-->
<app-first-child 
[childCounter]="parentCounter" 
(textChanged)="processChangeFromChild($event)"
(counterChanged)="parentCounter=$event">
</app-first-child>
