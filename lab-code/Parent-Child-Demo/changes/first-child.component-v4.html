<h3>Inside first-child</h3>

<p>Child counter is: {{childCounter}}</p>

<br>

<!-- Two buttons and corresponding event bindings to 
child component methods to increase and decrease 
the value of the counter  --> 
<button (click)="incCounter()">Increment</button>
<button (click)="decCounter()">Decrement</button>

<br>
<br>

<label for="childbox">Child text box :</label><br>

<!-- Standard event binding to use the template 
 reference variable textinput to pass the content of 
 the text field to the component method 
 processTextChange -->
<input #textinput type="text" id="childbox"  
(input)="processTextChange(textinput.value)">

<p>Value in text box: {{textinput.value}}</p>
